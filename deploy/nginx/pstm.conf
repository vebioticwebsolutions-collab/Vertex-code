# ─────────────────────────────────────────────────────────────────────────────
# PSTM — nginx reverse proxy for the Astro Node SSR backend
#
# ADDITIVE: this does NOT touch the existing root-domain server block that is
# already live + SEO-promoted. It only adds two new subdomains that both proxy
# to the same Astro Node process on 127.0.0.1:4321.
#
#   app.<domain>  → public Astro site (SSR)
#   api.<domain>  → VPS backend (/api/public/* + JWT-gated /api/internal/*)
#
# Install:
#   sudo cp pstm.conf /etc/nginx/sites-available/pstm.conf
#   sudo ln -s /etc/nginx/sites-available/pstm.conf /etc/nginx/sites-enabled/
#   sudo nginx -t
# Then run certbot (it injects the listen 443 / ssl_certificate lines):
#   sudo certbot --nginx -d app.<domain> -d api.<domain>
#
# Replace every <domain> below before installing.
# ─────────────────────────────────────────────────────────────────────────────

# Shared proxy settings → Astro Node standalone (HOST=127.0.0.1 PORT=4321)
upstream pstm_astro {
    server 127.0.0.1:4321;
    keepalive 32;
}

# --- Public site: app.<domain> ---
server {
    listen 80;
    listen [::]:80;
    server_name app.<domain>;

    # certbot manages the 443 block + redirect after first run.

    client_max_body_size 25m;

    location / {
        proxy_pass http://pstm_astro;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 60s;
    }
}

# --- VPS backend: api.<domain> ---
# IMPORTANT: keep this subdomain OFF Cloudflare Access (gap 7.11). It is gated by
# the INTERNAL_JWT_SECRET on /api/internal/*; Access would bounce server-to-server
# calls to a login page.
server {
    listen 80;
    listen [::]:80;
    server_name api.<domain>;

    # PDF/automation payloads can be larger than the default 1m.
    client_max_body_size 50m;

    location / {
        proxy_pass http://pstm_astro;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        # Heavy enqueue/poll endpoints; allow a slightly longer read timeout.
        proxy_read_timeout 120s;
    }
}
